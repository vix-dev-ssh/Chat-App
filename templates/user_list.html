{% extends "index.html" %}

{% block content %}
<div class="card">
    <h2>Users</h2>
    <a href="{% url 'logout' %}">Logout</a>

    {% for user in users %}
        <div class="user-list-item">
            <a href="{% url 'chat_page' user.id %}">
                {{ user.username }}
            </a>
            {% if user.is_online %}
                <span class="online-dot"></span>
            {% endif %}
        </div>
    {% endfor %}
</div>
{% endblock %}
